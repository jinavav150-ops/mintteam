  body{
    font-family:"Gowun Dodum",system-ui,sans-serif;
    position:fixed;inset:0;
    touch-action:none;
    user-select:none;-webkit-user-select:none;
  }

  /* ====== STAGE / 3D 틸트 ====== */
  #stage{position:absolute;inset:0;perspective:1100px;overflow:hidden}
  #scene{
    position:absolute;inset:-6%;
    transform-style:preserve-3d;
    transition:transform .25s cubic-bezier(.2,.7,.3,1);
    will-change:transform;
  }
  #moai{
    position:absolute;inset:0;
    background-image:var(--moai-src);
    background-size:cover;
    background-position:center 28%;
    filter:brightness(.34) contrast(1.05) saturate(.7);
    transition:filter 1.6s ease;
  }
  /* 비네팅 + 밤기운 */
  #scene::after{
    content:"";position:absolute;inset:-10%;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 38%, transparent 40%, rgba(3,5,12,.55) 78%, rgba(2,3,8,.95) 100%),
      linear-gradient(180deg, rgba(4,6,14,.5), transparent 30%, transparent 70%, rgba(3,4,10,.85));

  }
  body.awake #moai{filter:brightness(.92) contrast(1.08) saturate(1.02)}
  body.awake #scene::after{opacity:.7}

  /* ====== 눈빛 글로우 ====== */

    position:absolute;width:20vmin;height:13vmin;border-radius:50%;
    background:radial-gradient(circle, var(--glow) 0%, rgba(127,233,220,.5) 30%, transparent 70%);
    mix-blend-mode:screen;opacity:0;pointer-events:none;
    filter:blur(2px);
    transition:opacity 1s ease;
  }
  #eyeL{left:33%;top:29%}
  #eyeR{left:57%;top:29.5%}
  body.awake .eye{opacity:.0}
  body.awake.speaking .eye{opacity:.85;animation:eyePulse 1.4s ease-in-out infinite}
  body.awake.glow .eye{opacity:.55}
  @keyframes eyePulse{0%,100%{opacity:.45;transform:scale(.96)}50%{opacity:.95;transform:scale(1.06)}}

  /* ====== 빛줄기 (각성) ====== */
  #rays{
    position:absolute;left:50%;top:32%;width:240vmax;height:240vmax;
    transform:translate(-50%,-50%) scale(.2);
    background:repeating-conic-gradient(from 0deg,
      rgba(127,233,220,.0) 0deg,
      rgba(127,233,220,.16) 1.2deg,
      rgba(127,233,220,0) 3deg 7deg);
    opacity:0;pointer-events:none;mix-blend-mode:screen;
    will-change:transform,opacity;
  }
  body.awake #rays{animation:raysOn 2.4s ease forwards, raysSpin 60s linear infinite}
  @keyframes raysOn{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
    30%{opacity:.9}100%{opacity:.32;transform:translate(-50%,-50%) scale(1)}}
  @keyframes raysSpin{to{transform:translate(-50%,-50%) rotate(360deg) scale(1)}}

  /* ====== 플래시 ====== */
  #flash{position:absolute;inset:0;background:#eafffb;opacity:0;pointer-events:none;z-index:60}
  #flash.go{animation:flash 1.1s ease forwards}
  @keyframes flash{0%{opacity:0}8%{opacity:.95}100%{opacity:0}}

  /* ====== UI 레이어 ====== */
  #ui{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;padding:0 24px calc(34px + env(safe-area-inset-bottom));pointer-events:none}
  #ui>*{pointer-events:auto}

  /* 인트로 */
  #intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:0;z-index:45;transition:opacity .8s ease}

  .kicker{font-family:"Gowun Dodum";letter-spacing:.42em;font-size:11px;

    text-indent:.42em}
  #intro h1{font-family:"Gugi";font-weight:400;line-height:1.04;
    font-size:clamp(38px,12vw,82px);color:var(--ink);
    text-shadow:0 2px 30px rgba(127,233,220,.25), 0 1px 2px #000;
    margin-bottom:8px}
  #intro h1 .sub{display:block;font-size:.42em;color:var(--gold);letter-spacing:.08em;margin-top:10px;font-family:"Gowun Batang"}
  .tap-hint{margin-top:46px;font-family:"Gowun Batang";font-size:15px;color:var(--ink-dim);
    display:flex;flex-direction:column;align-items:center;gap:14px}
  .tap-ring{width:74px;height:74px;border-radius:50%;border:1.5px solid rgba(127,233,220,.5);
    display:grid;place-items:center;position:relative;color:var(--glow);font-size:26px}
  .tap-ring::before{content:"";position:absolute;inset:-1px;border-radius:50%;
    border:1.5px solid rgba(127,233,220,.6);animation:ripple 2.2s ease-out infinite}
  @keyframes ripple{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.9);opacity:0}}

  /* 신탁 자막 */
  #subtitle{max-width:560px;text-align:center;font-family:"Gowun Batang";
    font-size:clamp(19px,5.4vw,27px);line-height:1.7;color:var(--ink);
    text-shadow:0 2px 18px rgba(0,0,0,.9),0 0 30px rgba(127,233,220,.18);
    min-height:2.6em;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;
    margin-bottom:26px;font-weight:400}
  #subtitle.show{opacity:1;transform:none}
  #subtitle .em{color:var(--glow);font-weight:700}
  #subtitle .num{display:inline-flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  #subtitle .num b{font-family:"Gugi";font-weight:400;width:1.9em;height:1.9em;border-radius:50%;
    display:grid;place-items:center;background:radial-gradient(circle at 38% 30%,#1d3b3a,#0c1c20);
    border:1.5px solid var(--glow-deep);color:var(--glow);font-size:.82em;
    box-shadow:0 0 16px rgba(127,233,220,.35),inset 0 0 10px rgba(0,0,0,.6)}

  /* 메뉴 버튼 */
  #menu{display:flex;flex-wrap:wrap;gap:11px;justify-content:center;max-width:520px;
    opacity:0;transform:translateY(14px);transition:opacity .6s .2s,transform .6s .2s}
  #menu.show{opacity:1;transform:none}
  .btn{font-family:"Gowun Dodum";font-size:15px;color:var(--ink);
    background:linear-gradient(180deg,rgba(28,34,44,.86),rgba(14,18,26,.92));
    border:1px solid rgba(127,233,220,.28);border-radius:999px;
    padding:13px 19px;display:inline-flex;align-items:center;gap:8px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 6px 20px rgba(0,0,0,.45);cursor:pointer;
    transition:transform .15s,border-color .2s,background .2s}
  .btn:active{transform:scale(.95)}
  .btn:hover{border-color:rgba(127,233,220,.6);background:linear-gradient(180deg,rgba(34,42,54,.9),rgba(18,24,34,.95))}
  .btn .ic{font-size:18px;filter:drop-shadow(0 0 6px rgba(127,233,220,.5))}
  .btn.ghost{border-color:rgba(233,177,74,.3);color:var(--gold)}

  /* 질문 입력 */
  #ask{position:absolute;inset:0;background:rgba(4,6,12,.78);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;z-index:55;padding:30px}
  #ask.show{display:flex}
  #ask h2{font-family:"Gugi";font-weight:400;font-size:24px;color:var(--glow);text-align:center}
  #ask p{font-family:"Gowun Batang";color:var(--ink-dim);font-size:14px;text-align:center;margin-top:-8px}
  #qInput{width:min(92vw,460px);background:rgba(10,14,22,.9);border:1px solid rgba(127,233,220,.35);
    border-radius:16px;padding:16px 18px;color:var(--ink);font-family:"Gowun Batang";font-size:17px;
    text-align:center;outline:none}
  #qInput::placeholder{color:#5d6470}
  .ask-row{display:flex;gap:10px}

  /* 우상단 다시재우기 */
  #topbar{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:50;
    display:flex;gap:8px;opacity:0;transition:opacity .6s;pointer-events:none}
  #topbar.show{opacity:1;pointer-events:auto}
  .icon-btn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
    background:rgba(14,18,26,.7);border:1px solid rgba(255,255,255,.12);
    color:var(--ink-dim);font-size:18px;cursor:pointer;backdrop-filter:blur(6px)}
  .icon-btn:active{transform:scale(.9)}

  /* 토스트 */
  #toast{position:absolute;left:50%;top:calc(20px + env(safe-area-inset-top));transform:translate(-50%,-20px);
    background:rgba(14,20,28,.95);border:1px solid rgba(127,233,220,.3);color:var(--ink);
    font-family:"Gowun Dodum";font-size:14px;padding:11px 18px;border-radius:999px;z-index:70;
    opacity:0;transition:.3s;pointer-events:none}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  /* 말할 때 미세 흔들림 */
  body.speaking #scene{animation:tremor .12s linear infinite}
  @keyframes tremor{0%{}25%{transform:translate(.4px,-.3px)}50%{transform:translate(-.3px,.4px)}75%{transform:translate(.3px,.3px)}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important}
    #rays{display:none}
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="scene">
      <div id="moai"></div>
      <div id="rays"></div>
      <div class="eye" id="eyeL"></div>
      <div class="eye" id="eyeR"></div>
    </div>
  </div>
  <div id="flash"></div>

  <div id="topbar">
    <button class="icon-btn" id="muteBtn" title="음성 켜기/끄기">🔊</button>
    <button class="icon-btn" id="sleepBtn" title="다시 재우기">🌙</button>
  </div>

  <div id="ui">
    <div id="subtitle"></div>
    <div id="menu">
      <button class="btn" data-act="oracle"><span class="ic">🔮</span>오늘의 신탁</button>
      <button class="btn" data-act="yesno"><span class="ic">⚖️</span>예 또는 아니오</button>
      <button class="btn" data-act="number"><span class="ic">🎲</span>운명의 숫자</button>
      <button class="btn ghost" data-act="share"><span class="ic">📤</span>신탁 공유</button>
    </div>
  </div>

  <div id="intro">
    <div class="kicker">RAPA&nbsp;NUI · ORACLE</div>
    <h1>잠든 거인<span class="sub">천 년의 침묵을 깨워라</span></h1>
    <div class="tap-hint">
      <div class="tap-ring">👆</div>
      <div>화면을 <b style="color:var(--glow)">탭</b>하여 깨우십시오</div>
    </div>
  </div>

  <div id="ask">
    <h2>거인에게 물어라</h2>
    <p>예 또는 아니오로 답할 질문을 속삭이십시오</p>
    <input id="qInput" maxlength="60" placeholder="예) 이번 결정, 밀어붙여도 될까?" autocomplete="off">
    <div class="ask-row">
      <button class="btn" id="askGo"><span class="ic">🗿</span>신탁을 구한다</button>
      <button class="btn ghost" id="askCancel">물러난다</button>
    </div>
  </div>

  <div id="toast"></div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const body=document.body;
const intro=$("#intro"), subtitle=$("#subtitle"), menu=$("#menu"),
      topbar=$("#topbar"), flash=$("#flash"), scene=$("#scene"),
      ask=$("#ask"), qInput=$("#qInput"), toast=$("#toast");

let awake=false, muted=false, lastResult="", voicesReady=false, koVoice=null;

/* ---------- 신탁 콘텐츠 ---------- */
const ORACLES=[
  "바람이 너를 부른다. 망설이던 그 일을 시작하라. 때는 지금이다.",
  "잃은 줄 알았던 것이 곧 돌아온다. 마음을 닫지 마라.",
  "조용한 자가 끝내 가장 멀리 간다. 서두르지 마라.",
  "가까운 곳에 너를 시기하는 눈이 있다. 입을 무겁게 하라.",
  "물 위에 비친 달을 좇지 마라. 진짜는 네 등 뒤에 있다.",
  "오랜 인연 하나가 새 문을 연다. 연락을 미루지 마라.",
  "돈은 흐르는 물과 같다. 막으려 들면 넘치고, 길을 트면 모인다.",
  "세 번 흔들리는 마음은 거짓이 아니다. 그것을 믿어라.",
  "넘어진 자리에서 보석이 빛난다. 일어나며 발밑을 보라.",
  "큰 결정 앞에서 잠을 청하라. 새벽이 답을 가져온다.",
  "너의 침묵이 천 마디 말보다 강한 날이다.",
  "낡은 것을 버려야 새 바람이 든다. 오늘 하나를 비워라.",
  "웃음을 아끼지 마라. 그것이 너를 지키는 부적이 된다.",
  "멀리 떠날 운이 다가온다. 짐을 가볍게 꾸려라.",
  "기다리던 소식이 사흘 안에 닿는다. 마음을 가다듬어라.",
  "남의 길을 부러워 마라. 네 돌엔 네 얼굴이 새겨진다.",
  "작은 친절 하나가 큰 빚을 갚는다. 베풀어라.",
  "흐린 날에도 별은 그 자리에 있다. 보이지 않을 뿐.",
  "두 갈래 길이라면, 두려운 쪽을 택하라. 거기 성장이 있다.",
  "오늘의 손해가 내일의 방패가 된다. 분노를 거두라.",
  "꿈에 본 얼굴을 기억하라. 그것은 경고이자 선물이다.",
  "네가 미룬 한마디가 누군가를 살린다. 오늘 전하라.",
  "운은 준비된 자의 어깨에만 내려앉는다.",
  "거친 파도가 노련한 사공을 만든다. 이 고비를 환영하라.",
  "가진 것을 세어라. 너는 생각보다 부유하다.",
];
const YESNO=[
  {t:"그렇다. 망설임은 너의 적일 뿐이다.",y:1},
  {t:"그렇다. 다만 첫걸음은 조용히 내디뎌라.",y:1},
  {t:"아니다. 지금은 아니다. 한 달을 기다려라.",y:0},
  {t:"아니다. 그 길 끝엔 후회가 새겨져 있다.",y:0},
  {t:"때를 기다려라. 답은 아직 익지 않았다.",y:2},
  {t:"두 번 묻지 마라. 너는 이미 답을 알고 있다.",y:2},
  {t:"그렇다. 거인이 너의 등을 떠민다.",y:1},
  {t:"아니다. 욕심이 눈을 가렸다. 물러나라.",y:0},
  {t:"먼저 사람을 보라. 그러면 답이 보인다.",y:2},
  {t:"그렇다. 하늘이 너의 편에 섰다.",y:1},
];
const NUM_MSG=[
  "이 숫자들이 너의 길에 등불이 되리라.",
  "바람이 골라준 수다. 가볍게 품어라.",
  "거인의 눈이 본 여섯 개의 운명.",
  "탐하지 말되, 흘려보내지도 마라.",
];
const AWAKEN_LINES=[
  "오랜 잠에서… 나를 깨운 자가 누구인가.",
  "천 년의 침묵이… 너의 손길에 깨어났다.",
  "다시… 별이 보이는구나. 무엇을 묻고 싶으냐.",
];
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ---------- 음성 ---------- */
function loadVoices(){
  const v=speechSynthesis.getVoices();
  if(v.length){voicesReady=true;
    koVoice=v.find(x=>/ko[-_]?KR/i.test(x.lang)&&/male|남|호|준|진/i.test(x.name))
          ||v.find(x=>/ko[-_]?KR/i.test(x.lang))||v.find(x=>/^ko/i.test(x.lang))||null;}
}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}

function speak(text){
  if(muted||!('speechSynthesis' in window))return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(koVoice)u.voice=koVoice;
    u.lang="ko-KR"; u.rate=.86; u.pitch=.45; u.volume=1;
    body.classList.add("speaking");
    u.onend=()=>body.classList.remove("speaking");
    u.onerror=()=>body.classList.remove("speaking");
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- 저음 공명 (각성) ---------- */
let actx=null;
function boom(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended")actx.resume();
    const t=actx.currentTime;
    // 깊은 드론
    [55,82.4,41].forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type=i===2?"sine":"triangle";o.frequency.value=f;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.22,t+.25);
      g.gain.exponentialRampToValueAtTime(.0008,t+3.4);
      o.connect(g).connect(actx.destination);o.start(t);o.stop(t+3.5);
    });
    // 충격 노이즈
    const bs=actx.sampleRate*.7, buf=actx.createBuffer(1,bs,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,3);
    const ns=actx.createBufferSource();ns.buffer=buf;
    const nf=actx.createBiquadFilter();nf.type="lowpass";nf.frequency.value=420;
    const ng=actx.createGain();ng.gain.value=.5;
    ns.connect(nf).connect(ng).connect(actx.destination);ns.start(t);
  }catch(e){}
}

/* ---------- 자막 출력 ---------- */
function say(html,voice){
  subtitle.classList.remove("show");
  void subtitle.offsetWidth;
  subtitle.innerHTML=html;
  subtitle.classList.add("show");
  if(voice!==false)speak(voice||subtitle.textContent);
}

/* ---------- 각성 ---------- */
function awaken(){
  if(awake)return; awake=true;
  if(navigator.vibrate)navigator.vibrate([40,60,120,40,200]);
  boom();
  flash.classList.add("go");
  setTimeout(()=>flash.classList.remove("go"),1200);
  intro.classList.add("hide");
  body.classList.add("awake","glow");
  enableTilt();
  setTimeout(()=>{
    const line=pick(AWAKEN_LINES);
    say(`<span class="em">${line}</span>`,line);
    menu.classList.add("show");
    topbar.classList.add("show");
  },900);
}

/* ---------- 액션 ---------- */
function doOracle(){
  body.classList.add("glow");
  const o=pick(ORACLES);
  lastResult="🗿 오늘의 신탁\n\n「"+o+"」\n\n— 라파누이의 거인";
  say(o,o);
}
function doNumber(){
  const set=new Set();
  while(set.size<6)set.add(1+Math.floor(Math.random()*45));
  const nums=[...set].sort((a,b)=>a-b);
  const msg=pick(NUM_MSG);
  say(`${msg}<div class="num">${nums.map(n=>`<b>${n}</b>`).join("")}</div>`,
      msg+". "+nums.join(", "));
  lastResult="🎲 운명의 숫자\n\n"+nums.join("  ")+"\n\n「"+msg+"」\n— 라파누이의 거인";
}
function openAsk(){ask.classList.add("show");setTimeout(()=>qInput.focus(),100);}
function doYesNo(){
  const q=qInput.value.trim();
  ask.classList.remove("show");
  const r=pick(YESNO);
  const tag=r.y===1?"#1bd6b0":r.y===0?"#ff7a7a":"#e8b14a";
  const head=q?`<span style="color:var(--ink-dim);font-size:.78em">"${q}"</span><br>`:"";
  say(`${head}<span class="em" style="color:${tag}">${r.t}</span>`, (q?q+". ":"")+r.t);
  lastResult="⚖️ 거인의 답"+(q?'\n\nQ. '+q:"")+"\n\nA. "+r.t+"\n\n— 라파누이의 거인";
  qInput.value="";
}
async function doShare(){
  if(!lastResult){showToast("먼저 신탁을 구하라");return;}
  const text=lastResult+"\n\n👉 너도 거인을 깨워봐: "+location.href;
  try{
    if(navigator.share){await navigator.share({text});return;}
  }catch(e){}
  try{await navigator.clipboard.writeText(text);showToast("신탁을 복사했다. 채팅방에 붙여넣어라");}
  catch(e){showToast("길게 눌러 복사하라")}
}
function sleep(){
  speechSynthesis&&speechSynthesis.cancel();
  body.classList.remove("awake","glow","speaking");
  menu.classList.remove("show");topbar.classList.remove("show");
  subtitle.classList.remove("show");
  intro.classList.remove("hide");
  awake=false;
}
function showToast(t){toast.textContent=t;toast.classList.add("show");
  clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove("show"),2200);}

/* ---------- 시선 추적 / 3D 틸트 ---------- */
let tx=0,ty=0,cx=0,cy=0,tiltOn=false;
function applyTilt(){
  cx+=(tx-cx)*.08; cy+=(ty-cy)*.08;
  scene.style.transform=`rotateY(${cx}deg) rotateX(${-cy}deg) scale(1.04)`;
  requestAnimationFrame(applyTilt);
}
function enableTilt(){
  if(tiltOn)return; tiltOn=true; applyTilt();
  window.addEventListener("pointermove",e=>{
    const nx=(e.clientX/innerWidth-.5)*2, ny=(e.clientY/innerHeight-.5)*2;
    tx=nx*8; ty=ny*7;
  },{passive:true});
  if(window.DeviceOrientationEvent){
    const handler=e=>{
      if(e.gamma==null)return;
      tx=Math.max(-12,Math.min(12,e.gamma*.5));
      ty=Math.max(-9,Math.min(9,(e.beta-45)*.32));
    };
    if(typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission().then(s=>{
        if(s==="granted")window.addEventListener("deviceorientation",handler);
      }).catch(()=>{});
    }else window.addEventListener("deviceorientation",handler);
  }
}

/* ---------- 이벤트 ---------- */
intro.addEventListener("click",awaken);
intro.addEventListener("touchstart",e=>{e.preventDefault();awaken();},{passive:false});
menu.addEventListener("click",e=>{
  const b=e.target.closest(".btn"); if(!b)return;
  const a=b.dataset.act;
  if(a==="oracle")doOracle();
  else if(a==="number")doNumber();
  else if(a==="yesno")openAsk();
  else if(a==="share")doShare();
});
$("#askGo").addEventListener("click",doYesNo);
$("#askCancel").addEventListener("click",()=>ask.classList.remove("show"));
qInput.addEventListener("keydown",e=>{if(e.key==="Enter")doYesNo();});
$("#sleepBtn").addEventListener("click",sleep);
$("#muteBtn").addEventListener("click",()=>{
  muted=!muted;
  $("#muteBtn").textContent=muted?"🔇":"🔊";
  if(muted)speechSynthesis&&speechSynthesis.cancel();
  else showToast("거인의 목소리가 돌아왔다");
});
// iOS 음성 워밍업
window.addEventListener("pointerdown",function warm(){
  try{const u=new SpeechSynthesisUtterance(" ");u.volume=0;speechSynthesis.speak(u);}catch(e){}
  window.removeEventListener("pointerdown",warm);
},{once:true});
</script>
