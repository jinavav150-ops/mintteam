<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결혼준비 예산관리 & 체크리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe5f0 100%);
            min-height: 100vh;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #d63384;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: white;
            border: 2px solid #ffc0e0;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #d63384;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border-color: #ff1493;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(214, 51, 132, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 예산 관리 스타일 */
        .summary-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #ffe5f0;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }

        .summary-value {
            font-size: 18px;
            font-weight: bold;
        }

        .balance-value {
            color: #d63384;
        }

        .expense-value {
            color: #dc3545;
        }

        .income-value {
            color: #28a745;
        }

        .category-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #ffc0e0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #d63384;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn.active {
            background: #ff69b4;
            color: white;
            border-color: #ff69b4;
        }

        .add-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(214, 51, 132, 0.3);
        }

        .items-list {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .item {
            padding: 15px;
            margin-bottom: 10px;
            background: #ffeef8;
            border-radius: 12px;
            border-left: 4px solid #ff69b4;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-date {
            font-size: 14px;
            color: #666;
        }

        .item-amount {
            font-size: 18px;
            font-weight: bold;
            color: #d63384;
        }

        .item-description {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-delete {
            padding: 6px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-delete:first-child {
            background: #ff69b4;
        }

        .btn-delete:first-child:hover {
            background: #ff1493;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        /* 체크리스트 스타일 */
        .checklist-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            margin-bottom: 10px;
            background: #ffeef8;
            border-radius: 12px;
            border-left: 4px solid #ff69b4;
        }

        .checkbox-wrapper {
            margin-right: 12px;
            margin-top: 3px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff69b4;
        }

        .checklist-content {
            flex: 1;
        }

        .checklist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .checklist-date {
            font-size: 14px;
            color: #666;
        }

        .checklist-amount {
            font-size: 16px;
            font-weight: bold;
            color: #d63384;
        }

        .checklist-description {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            color: #d63384;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffc0e0;
            border-radius: 10px;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff69b4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
        }

        .no-items {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }

        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: white;
            color: #d63384;
            text-decoration: none;
            border-radius: 10px;
            border: 2px solid #ffc0e0;
            font-weight: bold;
        }

        .back-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div style="display: flex; gap: 8px; margin-bottom: 20px; align-items: center;">
        <a href="index.html" class="back-button" style="margin: 0; padding: 8px 12px; font-size: 13px;">← 메인</a>
        <button class="back-button" style="margin: 0; padding: 8px 12px; font-size: 13px; cursor: pointer; border: 2px solid #ffc0e0;" onclick="undoAction()" id="undo-btn" disabled>↶ 실행취소</button>
        <button class="back-button" style="margin: 0; padding: 8px 12px; font-size: 13px; cursor: pointer; border: 2px solid #ffc0e0;" onclick="redoAction()" id="redo-btn" disabled>↷ 재실행</button>
    </div>
    
    <div class="header">
        <h1>💑 결혼준비 예산관리 & 체크리스트</h1>
    </div>

    <!-- 탭 버튼 -->
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('budget')">결혼예산</button>
        <button class="tab-btn" onclick="switchTab('checklist')">체크리스트</button>
    </div>

    <!-- 결혼예산 탭 -->
    <div id="budget-tab" class="tab-content active">
        <!-- 요약 섹션 -->
        <div class="summary-section">
            <div class="summary-item">
                <span class="summary-label">💰 통장잔액</span>
                <span class="summary-value balance-value" id="balance">0원</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">💸 지출합계</span>
                <span class="summary-value expense-value" id="total-expense">0원</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">💵 수입합계</span>
                <span class="summary-value income-value" id="total-income">0원</span>
            </div>
        </div>

        <!-- 카테고리 버튼 -->
        <div class="category-buttons">
            <button class="category-btn active" onclick="selectCategory('expense')">지출</button>
            <button class="category-btn" onclick="selectCategory('income')">수입</button>
            <button class="category-btn" onclick="selectCategory('refund')">환불</button>
        </div>

        <!-- 항목 추가 버튼 -->
        <button class="add-button" onclick="openBudgetModal()">+ 항목 추가</button>

        <!-- 항목 리스트 -->
        <div class="items-list" id="budget-items"></div>
    </div>

    <!-- 체크리스트 탭 -->
    <div id="checklist-tab" class="tab-content">
        <button class="add-button" onclick="openChecklistModal()">+ 체크리스트 추가</button>
        <div class="items-list" id="checklist-items"></div>
    </div>

    <!-- 예산 항목 추가 모달 -->
    <div id="budget-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">항목 추가</div>
            <form id="budget-form">
                <div class="form-group">
                    <label>날짜</label>
                    <input type="date" id="budget-date" required>
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <input type="text" id="budget-description" placeholder="내용을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>금액</label>
                    <input type="number" id="budget-amount" placeholder="금액을 입력하세요" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeBudgetModal()">취소</button>
                    <button type="submit" class="modal-btn btn-save">저장</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 체크리스트 추가 모달 -->
    <div id="checklist-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">체크리스트 추가</div>
            <form id="checklist-form">
                <div class="form-group">
                    <label>날짜</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="date" id="checklist-date" style="flex: 1;">
                        <label style="display: flex; align-items: center; gap: 5px; margin: 0; white-space: nowrap;">
                            <input type="checkbox" id="checklist-date-tbd" onchange="toggleChecklistDate()">
                            미정
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <input type="text" id="checklist-description" placeholder="할 일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>금액</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="number" id="checklist-amount" placeholder="예상 금액을 입력하세요" style="flex: 1;">
                        <label style="display: flex; align-items: center; gap: 5px; margin: 0; white-space: nowrap;">
                            <input type="checkbox" id="checklist-amount-tbd" onchange="toggleChecklistAmount()">
                            미정
                        </label>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeChecklistModal()">취소</button>
                    <button type="submit" class="modal-btn btn-save">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js';
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, updateDoc } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBKpRb8lfrYaY42gNhZ4S1_xvPLjjJiXg8",
            authDomain: "dasol-moneybook-2dec7.firebaseapp.com",
            projectId: "dasol-moneybook-2dec7",
            storageBucket: "dasol-moneybook-2dec7.firebasestorage.app",
            messagingSenderId: "1049820880885",
            appId: "1:1049820880885:web:e0a4d0ba10adafde9c8f0f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCategory = 'expense';
        let budgetItems = [];
        let checklistItems = [];
        let editingBudgetId = null;
        let editingChecklistId = null;

        // 실행 취소/재실행 기능
        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO_STACK = 20;

        function saveStateToUndo(action, data) {
            undoStack.push({ action, data, timestamp: new Date() });
            if (undoStack.length > MAX_UNDO_STACK) {
                undoStack.shift();
            }
            redoStack = [];
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('undo-btn').disabled = undoStack.length === 0;
            document.getElementById('redo-btn').disabled = redoStack.length === 0;
        }

        window.undoAction = async function() {
            if (undoStack.length === 0) return;
            
            const lastAction = undoStack.pop();
            redoStack.push(lastAction);
            
            try {
                await restoreAction(lastAction, true);
                updateUndoRedoButtons();
            } catch (error) {
                console.error('Undo error:', error);
                alert('이전으로 되돌리는 중 오류가 발생했습니다.');
            }
        };

        window.redoAction = async function() {
            if (redoStack.length === 0) return;
            
            const nextAction = redoStack.pop();
            undoStack.push(nextAction);
            
            try {
                await restoreAction(nextAction, false);
                updateUndoRedoButtons();
            } catch (error) {
                console.error('Redo error:', error);
                alert('다음으로 이동하는 중 오류가 발생했습니다.');
            }
        };

        async function restoreAction(action, isUndo) {
            const { action: type, data } = action;
            
            if (type === 'add') {
                if (isUndo) {
                    await deleteDoc(doc(db, data.collection, data.id));
                } else {
                    await addDoc(collection(db, data.collection), data.item);
                }
            } else if (type === 'delete') {
                if (isUndo) {
                    await addDoc(collection(db, data.collection), data.item);
                } else {
                    await deleteDoc(doc(db, data.collection, data.id));
                }
            } else if (type === 'update') {
                if (isUndo) {
                    await updateDoc(doc(db, data.collection, data.id), data.oldValue);
                } else {
                    await updateDoc(doc(db, data.collection, data.id), data.newValue);
                }
            }
        }

        window.toggleChecklistDate = function() {
            const dateInput = document.getElementById('checklist-date');
            const checkbox = document.getElementById('checklist-date-tbd');
            dateInput.disabled = checkbox.checked;
            if (checkbox.checked) {
                dateInput.value = '';
            }
        };

        window.toggleChecklistAmount = function() {
            const amountInput = document.getElementById('checklist-amount');
            const checkbox = document.getElementById('checklist-amount-tbd');
            amountInput.disabled = checkbox.checked;
            if (checkbox.checked) {
                amountInput.value = '';
            }
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'budget') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('budget-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('checklist-tab').classList.add('active');
            }
        };

        window.selectCategory = function(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBudgetItems();
        };

        window.openBudgetModal = function() {
            editingBudgetId = null;
            document.getElementById('budget-modal').style.display = 'block';
            document.getElementById('budget-date').valueAsDate = new Date();
            document.querySelector('#budget-modal .modal-header').textContent = '항목 추가';
        };

        window.closeBudgetModal = function() {
            document.getElementById('budget-modal').style.display = 'none';
            document.getElementById('budget-form').reset();
            editingBudgetId = null;
        };

        window.editBudgetItem = function(id) {
            const item = budgetItems.find(item => item.id === id);
            if (!item) return;

            editingBudgetId = id;
            document.getElementById('budget-date').value = item.date;
            document.getElementById('budget-description').value = item.description;
            document.getElementById('budget-amount').value = item.amount;
            document.querySelector('#budget-modal .modal-header').textContent = '항목 수정';
            document.getElementById('budget-modal').style.display = 'block';
        };

        window.openChecklistModal = function() {
            editingChecklistId = null;
            document.getElementById('checklist-modal').style.display = 'block';
            document.getElementById('checklist-date').valueAsDate = new Date();
            document.getElementById('checklist-date').disabled = false;
            document.getElementById('checklist-date-tbd').checked = false;
            document.getElementById('checklist-amount').disabled = false;
            document.getElementById('checklist-amount-tbd').checked = false;
            document.querySelector('#checklist-modal .modal-header').textContent = '체크리스트 추가';
        };

        window.closeChecklistModal = function() {
            document.getElementById('checklist-modal').style.display = 'none';
            document.getElementById('checklist-form').reset();
            document.getElementById('checklist-date').disabled = false;
            document.getElementById('checklist-amount').disabled = false;
            editingChecklistId = null;
        };

        window.editChecklistItem = function(id) {
            const item = checklistItems.find(item => item.id === id);
            if (!item) return;

            editingChecklistId = id;
            
            const dateTbd = item.date === 'TBD';
            document.getElementById('checklist-date-tbd').checked = dateTbd;
            document.getElementById('checklist-date').disabled = dateTbd;
            document.getElementById('checklist-date').value = dateTbd ? '' : item.date;
            
            const amountTbd = item.amount === -1;
            document.getElementById('checklist-amount-tbd').checked = amountTbd;
            document.getElementById('checklist-amount').disabled = amountTbd;
            document.getElementById('checklist-amount').value = amountTbd ? '' : item.amount;
            
            document.getElementById('checklist-description').value = item.description;
            document.querySelector('#checklist-modal .modal-header').textContent = '체크리스트 수정';
            document.getElementById('checklist-modal').style.display = 'block';
        };

        document.getElementById('budget-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const date = document.getElementById('budget-date').value;
            const description = document.getElementById('budget-description').value;
            const amount = parseInt(document.getElementById('budget-amount').value);

            try {
                if (editingBudgetId) {
                    const oldItem = budgetItems.find(item => item.id === editingBudgetId);
                    const oldValue = { date: oldItem.date, description: oldItem.description, amount: oldItem.amount };
                    const newValue = { date, description, amount };
                    
                    saveStateToUndo('update', {
                        collection: 'weddingBudget',
                        id: editingBudgetId,
                        oldValue,
                        newValue
                    });
                    
                    await updateDoc(doc(db, 'weddingBudget', editingBudgetId), newValue);
                } else {
                    const newItem = {
                        date,
                        description,
                        amount,
                        category: currentCategory,
                        timestamp: new Date()
                    };
                    
                    const docRef = await addDoc(collection(db, 'weddingBudget'), newItem);
                    
                    saveStateToUndo('add', {
                        collection: 'weddingBudget',
                        id: docRef.id,
                        item: newItem
                    });
                }
                closeBudgetModal();
            } catch (error) {
                console.error('Error saving budget item:', error);
                alert('저장 중 오류가 발생했습니다.');
            }
        });

        document.getElementById('checklist-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dateTbd = document.getElementById('checklist-date-tbd').checked;
            const amountTbd = document.getElementById('checklist-amount-tbd').checked;
            
            const date = dateTbd ? 'TBD' : document.getElementById('checklist-date').value;
            const description = document.getElementById('checklist-description').value;
            const amount = amountTbd ? -1 : parseInt(document.getElementById('checklist-amount').value);

            if (!dateTbd && !date) {
                alert('날짜를 입력하거나 미정을 선택해주세요.');
                return;
            }
            if (!amountTbd && !amount && amount !== 0) {
                alert('금액을 입력하거나 미정을 선택해주세요.');
                return;
            }

            try {
                if (editingChecklistId) {
                    const oldItem = checklistItems.find(item => item.id === editingChecklistId);
                    const oldValue = { date: oldItem.date, description: oldItem.description, amount: oldItem.amount };
                    const newValue = { date, description, amount };
                    
                    saveStateToUndo('update', {
                        collection: 'weddingChecklist',
                        id: editingChecklistId,
                        oldValue,
                        newValue
                    });
                    
                    await updateDoc(doc(db, 'weddingChecklist', editingChecklistId), newValue);
                } else {
                    const newItem = {
                        date,
                        description,
                        amount,
                        checked: false,
                        timestamp: new Date()
                    };
                    
                    const docRef = await addDoc(collection(db, 'weddingChecklist'), newItem);
                    
                    saveStateToUndo('add', {
                        collection: 'weddingChecklist',
                        id: docRef.id,
                        item: newItem
                    });
                }
                closeChecklistModal();
            } catch (error) {
                console.error('Error saving checklist item:', error);
                alert('저장 중 오류가 발생했습니다.');
            }
        });

        window.deleteBudgetItem = async function(id) {
            if (confirm('이 항목을 삭제하시겠습니까?')) {
                try {
                    const item = budgetItems.find(item => item.id === id);
                    
                    saveStateToUndo('delete', {
                        collection: 'weddingBudget',
                        id: id,
                        item: { ...item }
                    });
                    
                    await deleteDoc(doc(db, 'weddingBudget', id));
                } catch (error) {
                    console.error('Error deleting budget item:', error);
                    alert('삭제 중 오류가 발생했습니다.');
                }
            }
        };

        window.deleteChecklistItem = async function(id) {
            if (confirm('이 항목을 삭제하시겠습니까?')) {
                try {
                    const item = checklistItems.find(item => item.id === id);
                    
                    saveStateToUndo('delete', {
                        collection: 'weddingChecklist',
                        id: id,
                        item: { ...item }
                    });
                    
                    await deleteDoc(doc(db, 'weddingChecklist', id));
                } catch (error) {
                    console.error('Error deleting checklist item:', error);
                    alert('삭제 중 오류가 발생했습니다.');
                }
            }
        };

        window.toggleChecklistItem = async function(id, checked) {
            try {
                await updateDoc(doc(db, 'weddingChecklist', id), {
                    checked: checked
                });
            } catch (error) {
                console.error('Error updating checklist item:', error);
            }
        };

        function formatCurrency(amount) {
            return amount.toLocaleString('ko-KR') + '원';
        }

        // 자동 정렬 함수: 날짜 내림차순 (최신이 위)
        function sortByDateDesc(items) {
            return [...items].sort((a, b) => {
                // 날짜 비교 (내림차순: 최신 날짜가 위)
                return b.date.localeCompare(a.date);
            });
        }

        // 체크리스트 자동 정렬: 미정이 최상단, 나머지는 날짜 내림차순
        function sortChecklistItems(items) {
            return [...items].sort((a, b) => {
                const aTBD = a.date === 'TBD';
                const bTBD = b.date === 'TBD';
                
                // 미정 항목은 항상 최상단
                if (aTBD && !bTBD) return -1;
                if (!aTBD && bTBD) return 1;
                
                // 둘 다 미정이면 timestamp로 정렬 (최신순)
                if (aTBD && bTBD) {
                    const aTime = a.timestamp?.toMillis ? a.timestamp.toMillis() : (a.timestamp?.getTime ? a.timestamp.getTime() : 0);
                    const bTime = b.timestamp?.toMillis ? b.timestamp.toMillis() : (b.timestamp?.getTime ? b.timestamp.getTime() : 0);
                    return bTime - aTime;
                }
                
                // 둘 다 날짜가 있으면 최근 날짜순 (내림차순)
                return b.date.localeCompare(a.date);
            });
        }

        function renderBudgetItems() {
            const container = document.getElementById('budget-items');
            const filteredItems = budgetItems.filter(item => item.category === currentCategory);
            
            // 날짜 내림차순 정렬
            const sortedItems = sortByDateDesc(filteredItems);
            
            if (sortedItems.length === 0) {
                container.innerHTML = '<div class="no-items">등록된 항목이 없습니다.</div>';
                return;
            }

            container.innerHTML = sortedItems.map((item) => `
                <div class="item" data-id="${item.id}">
                    <div class="item-header">
                        <span class="item-date">${item.date}</span>
                        <span class="item-amount">${formatCurrency(item.amount)}</span>
                    </div>
                    <div class="item-description">${item.description}</div>
                    <div class="item-actions">
                        <button class="btn-delete" onclick="editBudgetItem('${item.id}')">수정</button>
                        <button class="btn-delete" onclick="deleteBudgetItem('${item.id}')">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function renderChecklistItems() {
            const container = document.getElementById('checklist-items');
            
            // 자동 정렬: 미정 최상단, 나머지 날짜 내림차순
            const sortedItems = sortChecklistItems(checklistItems);
            
            if (sortedItems.length === 0) {
                container.innerHTML = '<div class="no-items">등록된 체크리스트가 없습니다.</div>';
                return;
            }

            container.innerHTML = sortedItems.map((item) => `
                <div class="checklist-item" data-id="${item.id}">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} 
                               onchange="toggleChecklistItem('${item.id}', this.checked)">
                    </div>
                    <div class="checklist-content">
                        <div class="checklist-header">
                            <span class="checklist-date">${item.date === 'TBD' ? '미정' : item.date}</span>
                            <span class="checklist-amount">${item.amount === -1 ? '미정' : formatCurrency(item.amount)}</span>
                        </div>
                        <div class="checklist-description">${item.description}</div>
                        <div class="item-actions">
                            <button class="btn-delete" onclick="editChecklistItem('${item.id}')">수정</button>
                            <button class="btn-delete" onclick="deleteChecklistItem('${item.id}')">삭제</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateSummary() {
            const expenses = budgetItems
                .filter(item => item.category === 'expense')
                .reduce((sum, item) => sum + item.amount, 0);
            
            const income = budgetItems
                .filter(item => item.category === 'income')
                .reduce((sum, item) => sum + item.amount, 0);
            
            const refunds = budgetItems
                .filter(item => item.category === 'refund')
                .reduce((sum, item) => sum + item.amount, 0);
            
            const totalExpense = expenses - refunds;
            const balance = income - totalExpense;

            document.getElementById('balance').textContent = formatCurrency(balance);
            document.getElementById('total-expense').textContent = formatCurrency(totalExpense);
            document.getElementById('total-income').textContent = formatCurrency(income);
        }

        // Firebase 데이터 리스너
        const budgetQuery = query(collection(db, 'weddingBudget'));
        onSnapshot(budgetQuery, (snapshot) => {
            budgetItems = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            
            renderBudgetItems();
            updateSummary();
        });

        const checklistQuery = query(collection(db, 'weddingChecklist'));
        onSnapshot(checklistQuery, (snapshot) => {
            checklistItems = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            
            renderChecklistItems();
        });

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        };
    </script>
</body>
</html>
